# Confirm Order GUI Configuration
title: "<gradient:#FF6B35:#FFA500>⚊ ⚊ ⚊ Confirm Order ⚊ ⚊ ⚊</gradient>"
rows: 3
items:
  border:
    slot: -1
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  confirm:
    slot: 11
    material: LIME_STAINED_GLASS_PANE
    name: "<green>✅ Confirm Order</green>"
    lore:
      - "<gray>Create this buy order</gray>"
      - "<gray>Total: <total_cost></gray>"
  preview:
    slot: 13
    material: PAPER
    name: "<gold>📦 Order Summary</gold>"
    lore:
      - "<gray>Item: <item_name></gray>"
      - "<gray>Quantity: <amount></gray>"
      - "<gray>Price per item: <price></gray>"
      - "<gray>Total: <total_cost></gray>"
  cancel:
    slot: 15
    material: RED_STAINED_GLASS_PANE
    name: "<red>❌ Cancel</red>"
    lore:
      - "<gray>Cancel and return to market</gray>"
