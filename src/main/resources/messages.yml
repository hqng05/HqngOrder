# ─── Loading Messages ────────────────────────────────────────
loading-orders: "<yellow>⏳ Loading orders...</yellow>"
orders-loaded: "<green>✅ Loaded <count> orders!</green>"

# ─── Economy Messages ────────────────────────────────────────
money-added: "<green>✅ Added <amount> to <player_name>'s account</green>"
money-withdrawn: "<green>✅ Withdrawn <amount> from <player_name>'s account</green>"